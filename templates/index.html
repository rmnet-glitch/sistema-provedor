<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clientes</title>

<style>
body { font-family: Arial; background:#f5f5f5; padding:10px; }

.card {
    background:white;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
}

.pago { color:green; font-weight:bold; }
.em_dia { color:orange; font-weight:bold; }
.atrasado { color:red; font-weight:bold; }

input {
    width:100%;
    padding:10px;
    margin-bottom:10px;
}

.btn {
    padding:5px 8px;
    margin-right:5px;
    border-radius:5px;
    color:white;
    text-decoration:none;
    font-size:12px;
}

.green { background:green; }
.red { background:red; }
.blue { background:blue; }
.orange { background:orange; }
.purple { background:purple; }
</style>

</head>

<body>

<h2>Clientes</h2>

<h3>Total: {{ total }}</h3>

<!-- BUSCA -->
<form method="GET" action="/">
<input type="text" name="search" placeholder="Buscar cliente..." value="{{ search }}">
</form>

<!-- CADASTRO -->
<form method="POST" action="/cadastrar">

<input name="nome" placeholder="Nome" required>
<input name="telefone" placeholder="Telefone" required>
<input name="valor" placeholder="Valor" required>
<input name="vencimento" placeholder="Dia vencimento" required>

<button type="submit">Cadastrar</button>

</form>

<!-- LISTA -->
{% for c in clientes %}

<div class="card">

<b>{{ c.nome }}</b><br>
{{ c.telefone }}<br>
{{ c.valor }}<br>

Status: <span class="{{ c.status }}">{{ c.status }}</span><br>

<a class="btn green" href="/pagar/{{ c.id }}">Pagar</a>
<a class="btn orange" href="/desfazer/{{ c.id }}">Desfazer</a>
<a class="btn red" href="/excluir/{{ c.id }}" onclick="return confirm('Excluir?')">Excluir</a>
<a class="btn purple" href="/cobrar/{{ c.id }}">Cobrar</a>

</div>

{% endfor %}

</body>
</html>
