<!-- BOTÃO EDITAR CORRETO -->
<a class="btn edit" href="#"
onclick="abrirEditar({{ c.id }}, '{{ c.nome }}', '{{ c.telefone }}', '{{ c.valor }}', '{{ c.vencimento }}')">
Editar
</a>

<!-- FORM EDITAR -->
<div class="box" id="editar">

<form id="formEditar" method="POST">

<input id="edit_nome" name="nome">
<input id="edit_telefone" name="telefone">
<input id="edit_valor" name="valor">
<input id="edit_vencimento" name="vencimento">

<button type="submit">Salvar</button>

</form>

</div>

<script>

function abrirEditar(id, nome, telefone, valor, vencimento) {

    if (!id) {
        alert("Erro: ID inválido");
        return;
    }

    document.getElementById("editar").style.display = "block";

    document.getElementById("edit_nome").value = nome;
    document.getElementById("edit_telefone").value = telefone;
    document.getElementById("edit_valor").value = valor;
    document.getElementById("edit_vencimento").value = vencimento;

    document.getElementById("formEditar").action = "/editar/" + id;
}

</script>
