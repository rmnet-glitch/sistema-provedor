<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RM NET</title>

<style>
body{font-family:Arial;background:#f4f6f8;padding:10px}

.card{
background:#fff;
padding:8px;
margin:6px 0;
border-radius:8px;
font-size:13px;
}

.atrasado{border-left:4px solid red}
.em_dia{border-left:4px solid blue}
.pago{border-left:4px solid green}

.topbar{display:flex;gap:5px;flex-wrap:wrap}

input,button{padding:6px;font-size:13px}

.stats{
background:#fff;
padding:10px;
border-radius:8px;
margin-bottom:10px;
font-size:12px;
}
</style>
</head>

<body>

<h3>📊 Dashboard RM NET</h3>

<!-- STATS NOVAS -->
<div class="stats">
💰 Total Geral: {{total_geral}}<br>
💵 Recebido: {{total_recebido}}<br>
🔴 Em Atraso: {{total_atrasado}}<br>
🔵 Em Dia: {{total_em_dia}}
</div>

<form class="topbar">
<input type="month" name="mes" value="{{mes_ref}}">
<input type="text" name="busca" placeholder="Buscar..." value="{{busca}}">
<button>OK</button>
</form>

<hr>

{% for c in clientes %}

<div class="card {{c[5]}}">

<b>{{c[1]}}</b><br>
📞 {{c[2]}}<br>
💰 {{c[3]}} | 📅 Dia {{c[4]}} | ⚡ {{c[5]}}

</div>

{% endfor %}

</body>
</html>
