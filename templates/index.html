<!DOCTYPE html>
<html>
<head>
    <title>Sistema de Clientes</title>

    <style>
        body { font-family: Arial; background:#f2f2f2; padding:20px; }

        .topbar {
            display:flex;
            justify-content:space-between;
            margin-bottom:20px;
        }

        .btn {
            padding:10px;
            border:none;
            cursor:pointer;
            border-radius:5px;
        }

        .add-box, .list-box {
            background:white;
            padding:15px;
            border-radius:10px;
            margin-bottom:20px;
        }

        .card {
            padding:15px;
            margin:10px 0;
            border-radius:10px;
        }

        .pago { border-left:8px solid green; }
        .atrasado { border-left:8px solid red; }

        .whatsapp {
            background:#25D366;
            color:white;
            text-decoration:none;
            padding:8px;
            border-radius:5px;
            display:inline-block;
        }
    </style>
</head>

<body>

<div class="topbar">
    <h2>Clientes</h2>
    <a href="/logout">Sair</a>
</div>

<!-- BOTÃO CADASTRO -->
<div class="add-box">
    <h3>Cadastrar Cliente</h3>

    <form action="/add" method="post">

        <input name="nome" placeholder="Nome" required>
        <input name="telefone" placeholder="Telefone (DDD)" required>
        <input name="valor" placeholder="Valor" required>
        <input name="vencimento" type="date" required>

        <button class="btn" style="background:blue;color:white;">
            Salvar
        </button>

    </form>
</div>

<!-- LISTA -->
<div class="list-box">

{% for c in clientes %}

<div class="card {{ c[5] }}">

    <p><b>{{ c[1] }}</b></p>
    <p>Telefone: {{ c[2] }}</p>
    <p>Valor: R$ {{ c[3] }}</p>
    <p>Vencimento: {{ c[4] }}</p>
    <p>Status: <b>{{ c[5] }}</b></p>

    <!-- WHATSAPP -->
    <a class="whatsapp"
       href="https://wa.me/55{{ c[2] }}?text=Olá%20{{ c[1] }},%20sua%20mensalidade%20de%20R$%20{{ c[3] }}%20está%20em%20aberto.">
       WhatsApp
    </a>

    <a href="/pago/{{ c[0] }}"><button class="btn" style="background:green;color:white;">Pago</button></a>
    <a href="/atrasado/{{ c[0] }}"><button class="btn" style="background:orange;color:white;">Atrasado</button></a>
    <a href="/delete/{{ c[0] }}"><button class="btn" style="background:red;color:white;">Excluir</button></a>

</div>

{% endfor %}

</div>

</body>
</html>
