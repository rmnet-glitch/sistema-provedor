<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema Provedor</title>

<style>

body {
    font-family: Arial;
    background: #eef2f7;
    margin: 0;
    padding: 10px;
}

/* CABEÇALHO */
.header {
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 10px;
}

/* INFO TOP */
.info {
    background: #111;
    color: white;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
    font-size: 14px;
}

/* BOTÕES TOPO */
.top {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

.top a {
    flex: 1;
    text-align: center;
    padding: 10px;
    border-radius: 8px;
    color: white;
    text-decoration: none;
    font-size: 14px;
}

.green { background: green; }
.blue { background: #007bff; }
.gray { background: #555; }

/* FORM */
.box {
    display: none;
    background: white;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    font-size: 14px;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 6px;
    background: green;
    color: white;
}

/* CARD CLIENTE */
.card {
    background: white;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
}

/* STATUS */
.pago { color: green; font-weight: bold; }
.em_dia { color: orange; font-weight: bold; }
.atrasado { color: red; font-weight: bold; }

/* BOTÕES CLIENTE */
.btn {
    display: inline-block;
    padding: 6px 8px;
    margin-top: 5px;
    border-radius: 6px;
    font-size: 12px;
    color: white;
    text-decoration: none;
}

.pay { background: green; }
.undo { background: orange; }
.del { background: red; }
.msg { background: purple; }

</style>

</head>

<body>

<div class="header">
📡 Sistema de Clientes
</div>

<!-- INFO -->
<div class="info">
💰 Recebido no mês: <b>{{ recebido }}</b><br>
📊 Total geral: <b>{{ total }}</b>
</div>

<!-- TOPO BOTÕES -->
<div class="top">

<a class="green" href="#" onclick="toggleCadastro()">➕ Cadastrar</a>
<a class="blue" href="#" onclick="toggleBusca()">🔍 Buscar</a>
<a class="gray" href="/logout">Sair</a>

</div>

<!-- CADASTRO -->
<div class="box" id="cadastro">

<form method="POST" action="/cadastrar">

<input name="nome" placeholder="Nome" required>
<input name="telefone" placeholder="Telefone" required>
<input name="valor" placeholder="Valor" required>
<input name="vencimento" placeholder="Dia vencimento" required>

<button type="submit">Salvar Cliente</button>

</form>

</div>

<!-- BUSCA -->
<div class="box" id="busca">

<form method="GET" action="/">

<input name="search" placeholder="Buscar nome ou telefone" value="{{ search }}">

<button type="submit">Buscar</button>

</form>

</div>

<!-- LISTA -->
{% for c in clientes %}

<div class="card">

<b>{{ c.nome }}</b><br>
📞 {{ c.telefone }}<br>
💰 {{ c.valor }}<br>

Status:
<span class="{{ c.status }}">{{ c.status }}</span><br>

<a class="btn pay" href="/pagar/{{ c.id }}">Pagar</a>
<a class="btn undo" href="/desfazer/{{ c.id }}">Desfazer</a>
<a class="btn del" href="/excluir/{{ c.id }}" onclick="return confirm('Excluir cliente?')">Excluir</a>
<a class="btn msg" href="/cobrar/{{ c.id }}">Cobrar</a>

</div>

{% endfor %}

<script>

function toggleCadastro() {
    let x = document.getElementById("cadastro");
    x.style.display = x.style.display === "block" ? "none" : "block";
}

function toggleBusca() {
    let x = document.getElementById("busca");
    x.style.display = x.style.display === "block" ? "none" : "block";
}

</script>

</body>
</html>
