<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema</title>

<style>
body{font-family:Arial;background:#f4f6f8;padding:10px;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.topbar{display:flex;gap:5px;flex-wrap:wrap;}
input,button,select{padding:6px;font-size:13px;}

.stats{background:#fff;padding:10px;border-radius:8px;margin-bottom:10px;font-size:12px;}
.card{background:#fff;padding:7px;margin:5px 0;border-radius:8px;font-size:12px;}

.atrasado{border-left:4px solid red;}
.em_dia{border-left:4px solid blue;}
.pago{border-left:4px solid green;}

.actions{display:flex;gap:4px;margin-top:4px;}

.btn{flex:1;padding:4px;font-size:10px;border:none;border-radius:4px;color:#fff;}
.btn-success{background:#28a745}
.btn-danger{background:#dc3545}
.btn-info{background:#17a2b8}
.btn-dark{background:#343a40}
.btn-secondary{background:#6c757d}

.hidden{display:none;}
</style>
</head>

<body>

<div class="header">
<h3>👤 {{usuario}}</h3>
</div>

<form class="topbar">
<input type="month" name="mes" value="{{mes_ref}}">
<input type="text" name="busca" value="{{busca}}" placeholder="Buscar">
<button>OK</button>
</form>

<div class="stats">
💰 Total: {{total_geral}}<br>
💵 Recebido: {{total_recebido}}<br>
💸 Gastos: {{total_gastos}}<br>
<b>Lucro: {{lucro}}</b>
</div>

{% for c in clientes %}

<div class="card {{c[5]}}">

<b>{{c[1]}}</b><br>
📞 {{c[2]}}<br>
💰 {{c[3]}} | 📅 {{c[4]}} | {{c[5]}}

<a target="_blank"
href="https://wa.me/55{{c[2]}}?text={{mensagem|urlencode}}">
<button class="btn btn-secondary">WhatsApp</button>
</a>

<div class="actions">
<button class="btn btn-info" onclick="toggle('e{{c[0]}}')">Editar</button>
</div>

<!-- EDIT CORRIGIDO -->
<div id="e{{c[0]}}" class="hidden">
<form action="/edit/{{c[0]}}?mes={{mes_ref}}" method="post">
<input name="nome" value="{{c[1]}}">
<input name="telefone" value="{{c[2]}}">
<input name="valor" value="{{c[3]}}">
<input name="vencimento_dia" value="{{c[4]}}">
<button>Salvar</button>
</form>
</div>

</div>

{% endfor %}

<script>
function toggle(id){
let e=document.getElementById(id);
e.style.display = e.style.display==="block"?"none":"block";
}
</script>

</body>
</html>
