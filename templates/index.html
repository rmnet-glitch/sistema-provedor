<!DOCTYPE html>
<html>
<head>
    <title>Sistema Clientes</title>

    <style>
        body { font-family: Arial; background:#f4f4f4; padding:20px; }

        .card { background:white; padding:15px; margin:10px 0; border-radius:10px; }

        .pago { border-left:8px solid green; }
        .atrasado { border-left:8px solid red; }

        button { padding:5px 10px; margin:3px; cursor:pointer; }

        .top { display:flex; gap:10px; margin-bottom:20px; }
    </style>
</head>

<body>

<h2>Cadastro de Clientes</h2>

<div class="top">
    <form action="/add" method="post">
        <input name="nome" placeholder="Nome" required>
        <input name="valor" placeholder="Valor" required>
        <button type="submit">Cadastrar</button>
    </form>

    <a href="/logout">Sair</a>
</div>

<hr>

<h3>Clientes</h3>

{% for c in clientes %}

<div class="card {{ c[3] }}">

    <form action="/edit/{{ c[0] }}" method="post">
        <input name="nome" value="{{ c[1] }}">
        <input name="valor" value="{{ c[2] }}">

        <button type="submit">Salvar</button>
    </form>

    <p>Status: <b>{{ c[3] }}</b></p>

    <a href="/pago/{{ c[0] }}">
        <button style="background:green;color:white;">Pago</button>
    </a>

    <a href="/atrasado/{{ c[0] }}">
        <button style="background:orange;color:white;">Atrasado</button>
    </a>

    <a href="/delete/{{ c[0] }}" onclick="return confirm('Excluir?')">
        <button style="background:red;color:white;">Excluir</button>
    </a>

</div>

{% endfor %}

</body>
</html>
