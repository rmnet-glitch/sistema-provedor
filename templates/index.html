<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema</title>

<style>
body{font-family:Arial;background:#f4f6f8;padding:10px;}
.card{background:#fff;padding:10px;margin:10px 0;border-radius:10px;}
.atrasado{border-left:5px solid red;}
.em_dia{border-left:5px solid blue;}
.pago{border-left:5px solid green;}
button{padding:8px;margin:3px;width:100%}
</style>
</head>

<body>

<h2>Sistema de Clientes</h2>

<!-- SELETOR DE MÊS -->
<form method="get">
    <input type="month" name="mes" value="{{ mes_ref }}">
    <button>Filtrar</button>
</form>

<p>Total: R$ {{ total_geral }}</p>
<p>Recebido: R$ {{ total_recebido }}</p>

<hr>

{% for c in clientes %}

<div class="card {{ c[5] }}">

<b>{{ c[1] }}</b><br>
{{ c[2] }}<br>
R$ {{ c[3] }}<br>
Dia {{ c[4] }}<br>
Status: {{ c[5] }}

<br>

<a href="/pago/{{c[0]}}?mes={{mes_ref}}">
<button style="background:green;color:#fff">Pago</button>
</a>

<a href="/desfazer/{{c[0]}}?mes={{mes_ref}}">
<button style="background:gray;color:#fff">Desfazer</button>
</a>

</div>

{% endfor %}

</body>
</html>
