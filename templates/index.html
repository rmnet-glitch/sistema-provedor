<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema RM NET</title>

<style>
body{font-family:Arial;background:#f4f6f8;padding:10px}

.topbar{display:flex;gap:5px;flex-wrap:wrap}

input,button{padding:6px;font-size:13px}

.card{
background:#fff;
padding:8px;
margin:6px 0;
border-radius:8px;
font-size:13px;
}

.atrasado{border-left:4px solid red}
.em_dia{border-left:4px solid blue}
.pago{border-left:4px solid green}

.actions button{
width:48%;
padding:5px;
font-size:11px;
margin-top:4px;
}

.small{font-size:11px;color:#666}

.hidden{display:none}
</style>
</head>

<body>

<h3>Clientes RM NET</h3>

<!-- BUSCA -->
<form class="topbar">
<input type="month" name="mes" value="{{mes_ref}}">
<input type="text" name="busca" placeholder="Buscar cliente..." value="{{busca}}">
<button>OK</button>
</form>

<p class="small">
Total: {{total_geral}} |
Recebido: {{total_recebido}}
</p>

<!-- CADASTRO -->
<button onclick="toggle('cad')">+ Cliente</button>

<div id="cad" class="hidden">
<form action="/add" method="post">
<input name="nome" placeholder="Nome">
<input name="telefone" placeholder="Telefone (DDD+numero)">
<input name="valor" placeholder="Valor">
<input name="vencimento_dia" placeholder="Dia vencimento">
<button>Salvar</button>
</form>
</div>

<hr>

{% for c in clientes %}

<div class="card {{c[5]}}">

<b>{{c[1]}}</b> <span class="small">{{c[2]}}</span><br>
R$ {{c[3]}} | Dia {{c[4]}} | {{c[5]}}

<!-- WHATSAPP -->
<a target="_blank"
href="https://wa.me/55{{c[2]}}?text=Olá,%20seu%20boleto%20RM%20NET%20venceu.%20%0A%0A*Essa%20é%20uma%20mensagem%20automática.*">

<button style="background:#25D366;color:#fff;width:100%;font-size:11px;margin-top:5px">
WhatsApp
</button>

</a>

<div class="actions">

<a href="/pago/{{c[0]}}?mes={{mes_ref}}">
<button>Pago</button>
</a>

<a href="/desfazer/{{c[0]}}?mes={{mes_ref}}">
<button>Voltar</button>
</a>

</div>

<div class="actions">

<button onclick="toggle('e{{c[0]}}')">Editar</button>

<a href="/delete/{{c[0]}}">
<button>Excluir</button>
</a>

</div>

<div id="e{{c[0]}}" class="hidden">
<form action="/edit/{{c[0]}}" method="post">
<input name="nome" value="{{c[1]}}">
<input name="telefone" value="{{c[2]}}">
<input name="valor" value="{{c[3]}}">
<input name="vencimento_dia" value="{{c[4]}}">
<button>Salvar</button>
</form>
</div>

</div>

{% endfor %}

<script>
function toggle(id){
let e=document.getElementById(id);
e.style.display = e.style.display==="block"?"none":"block";
}
</script>

</body>
</html>
