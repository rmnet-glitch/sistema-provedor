<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clientes</title>

<style>
body {
    font-family: Arial;
    background:#f4f6f8;
    margin:0;
    padding:10px;
}

.card {
    background:white;
    padding:12px;
    margin:10px 0;
    border-radius:12px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.pago { border-left:6px solid green; }
.atrasado { border-left:6px solid red; }

input, button {
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border:1px solid #ddd;
}

button {
    border:none;
    color:white;
}

.btn-blue { background:#007bff; }
.btn-green { background:#28a745; }
.btn-red { background:#dc3545; }
.btn-orange { background:#ff9800; }

.small {
    display:flex;
    gap:5px;
    flex-wrap:wrap;
}

.small a {
    flex:1;
}

a button {
    width:100%;
}
</style>
</head>

<body>

<h2>Clientes</h2>

<a href="/reset-mes">
    <button class="btn-orange">Reset Mensal (Todos Atrasados)</button>
</a>

<hr>

<h3>Cadastrar</h3>

<form action="/add" method="post">

<input name="nome" placeholder="Nome">
<input name="telefone" placeholder="Telefone">
<input name="valor" placeholder="Valor">
<input name="vencimento_dia" placeholder="Dia vencimento (1-31)">

<button class="btn-blue">Salvar</button>

</form>

<hr>

{% for c in clientes %}

<div class="card {{ c[5] }}">

<form action="/edit/{{ c[0] }}" method="post">

<input name="nome" value="{{ c[1] }}">
<input name="telefone" value="{{ c[2] }}">
<input name="valor" value="{{ c[3] }}">
<input name="vencimento_dia" value="{{ c[4] }}">

<button class="btn-blue">Editar</button>

</form>

<p>Status: {{ c[5] }}</p>

<div class="small">

<a href="/pago/{{ c[0] }}"><button class="btn-green">Pago</button></a>
<a href="/atrasado/{{ c[0] }}"><button class="btn-orange">Atrasado</button></a>

<a href="https://wa.me/55{{ c[2] }}"
target="_blank">
<button class="btn-green">WhatsApp</button>
</a>

<a href="/delete/{{ c[0] }}"
onclick="return confirm('Excluir?')">
<button class="btn-red">Excluir</button>
</a>

</div>

</div>

{% endfor %}

</body>
</html>
