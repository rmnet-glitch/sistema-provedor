<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema</title>

<style>
body {font-family:Arial;background:#f4f6f8;margin:0;padding:10px;}

.header {display:flex;justify-content:space-between;margin-bottom:10px;}

.card {background:#fff;padding:12px;margin:10px 0;border-radius:12px;}

.atrasado {border-left:6px solid red;}
.em_dia {border-left:6px solid #2196f3;}
.pago {border-left:6px solid green;}

.badge {color:red;font-weight:bold;}

button,input {width:100%;padding:10px;margin:5px 0;border-radius:8px;}

.btn-blue{background:#007bff;color:#fff;}
.btn-green{background:#28a745;color:#fff;}
.btn-red{background:#dc3545;color:#fff;}
.btn-orange{background:#ff9800;color:#fff;}
.btn-gray{background:#6c757d;color:#fff;}

.hidden{display:none;}

.whatsapp{
background:#25D366;color:#fff;text-align:center;padding:10px;
display:block;border-radius:8px;text-decoration:none;
}
</style>
</head>

<body>

<div class="header">
<h2>Clientes</h2>
<a href="/logout"><button class="btn-red">Sair</button></a>
</div>

<div>
<p>Total: R$ {{ total_geral }}</p>
<p>Recebido: R$ {{ total_recebido }}</p>
</div>

<button class="btn-blue" onclick="toggle('cad')">Cadastrar</button>

<div id="cad" class="hidden">
<form action="/add" method="post">
<input name="nome" placeholder="Nome">
<input name="telefone">
<input name="valor">
<input name="vencimento_dia">
<button class="btn-blue">Salvar</button>
</form>
</div>

<hr>

{% for c in clientes %}

<div class="card {{ c[5] }}">

<b>{{ c[1] }}</b>

{% if c[5]=='atrasado' %}
<span class="badge">ATRASADO</span>
{% endif %}

<p>{{ c[2] }}</p>
<p>R$ {{ c[3] }}</p>
<p>Dia {{ c[4] }}</p>
<p>{{ c[5] }}</p>

<button class="btn-orange" onclick="toggle('e{{c[0]}}')">Editar</button>

<div id="e{{c[0]}}" class="hidden">
<form action="/edit/{{c[0]}}" method="post">
<input name="nome" value="{{c[1]}}">
<input name="telefone" value="{{c[2]}}">
<input name="valor" value="{{c[3]}}">
<input name="vencimento_dia" value="{{c[4]}}">
<button class="btn-blue">Salvar</button>
</form>
</div>

<a class="whatsapp"
href="https://wa.me/55{{c[2]}}">
WhatsApp
</a>

<div>
<a href="/pago/{{c[0]}}"><button class="btn-green">Pago</button></a>

{% if c[5]=='pago' %}
<a href="/desfazer/{{c[0]}}">
<button class="btn-gray">Desfazer</button>
</a>
{% endif %}

<a href="/delete/{{c[0]}}">
<button class="btn-red">Excluir</button>
</a>
</div>

</div>

{% endfor %}

<script>
function toggle(id){
let e=document.getElementById(id);
e.style.display=e.style.display==="block"?"none":"block";
}
</script>

</body>
</html>
