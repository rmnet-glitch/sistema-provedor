<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema Clientes</title>

<style>
body {
    font-family: Arial;
    background:#f4f6f8;
    margin:0;
    padding:10px;
}

.card {
    background:white;
    padding:12px;
    margin:10px 0;
    border-radius:12px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.pago { border-left:6px solid green; }
.atrasado { border-left:6px solid red; }

input, button {
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border:1px solid #ddd;
}

button {
    border:none;
    color:white;
    cursor:pointer;
}

.btn-blue { background:#007bff; }
.btn-green { background:#28a745; }
.btn-red { background:#dc3545; }
.btn-orange { background:#ff9800; }

.box {
    background:white;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}

.small {
    display:flex;
    gap:5px;
    flex-wrap:wrap;
}

.small a { flex:1; }

.hidden { display:none; }

.whatsapp {
    background:#25D366;
    color:white;
    text-align:center;
    padding:10px;
    border-radius:8px;
    display:block;
    text-decoration:none;
}
</style>
</head>

<body>

<h2>Clientes</h2>

<!-- BOTÃO CADASTRO -->
<button class="btn-blue" onclick="toggle('cadastro')">
Cadastrar Cliente
</button>

<div id="cadastro" class="box hidden">

<form action="/add" method="post">

<input name="nome" placeholder="Nome">
<input name="telefone" placeholder="Telefone (DDD)">
<input name="valor" placeholder="Valor">
<input name="vencimento_dia" placeholder="Dia vencimento (1-31)">

<button class="btn-blue">Salvar</button>

</form>

</div>

<hr>

{% for c in clientes %}

<div class="card {{ c[5] }}">

<p><b>{{ c[1] }}</b></p>
<p>📞 {{ c[2] }}</p>
<p>💰 R$ {{ c[3] }}</p>
<p>📅 Dia venc: {{ c[4] }}</p>
<p>Status: {{ c[5] }}</p>

<!-- EDITAR -->
<button class="btn-orange" onclick="toggle('edit{{ c[0] }}')">
Editar
</button>

<div id="edit{{ c[0] }}" class="hidden">

<form action="/edit/{{ c[0] }}" method="post">

<input name="nome" value="{{ c[1] }}">
<input name="telefone" value="{{ c[2] }}">
<input name="valor" value="{{ c[3] }}">
<input name="vencimento_dia" value="{{ c[4] }}">

<button class="btn-blue">Salvar alteração</button>

</form>

</div>

<!-- WHATSAPP -->
<a class="whatsapp"
href="https://wa.me/55{{ c[2] }}?text=Olá%20{{ c[1] }},%20sua%20mensalidade%20de%20R$%20{{ c[3] }}%20está%20em%20aberto.">
Enviar WhatsApp
</a>

<div class="small">

<a href="/pago/{{ c[0] }}"><button class="btn-green">Pago</button></a>
<a href="/atrasado/{{ c[0] }}"><button class="btn-orange">Atrasado</button></a>
<a href="/delete/{{ c[0] }}"><button class="btn-red">Excluir</button></a>

</div>

</div>

{% endfor %}

<script>
function toggle(id){
    let el = document.getElementById(id);
    el.style.display = (el.style.display === "block") ? "none" : "block";
}
</script>

</body>
</html>
