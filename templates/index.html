<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema</title>

<style>
body{font-family:Arial;background:#f4f6f8;padding:10px;}

.header{display:flex;justify-content:space-between;margin-bottom:10px;}

.dashboard{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-bottom:10px;
}

.card-stat{
background:#fff;
padding:10px;
border-radius:10px;
}

.lucro{
grid-column:span 2;
text-align:center;
font-weight:bold;
}

.lucro.positivo{color:green;}
.lucro.negativo{color:red;}

.card{
background:#fff;
padding:8px;
margin:5px 0;
border-radius:8px;
}

.btn{
padding:5px;
border:none;
border-radius:5px;
color:#fff;
}

.info{background:#17a2b8}
.dark{background:#343a40}
.danger{background:#dc3545}
.green{background:#28a745}

</style>
</head>

<body>

<div class="header">
<h3>{{usuario}}</h3>

<div>
<a href="/gastos?mes={{mes_ref}}">
<button class="btn green">💸 Gastos</button>
</a>

<a href="/logout">
<button class="btn danger">Sair</button>
</a>
</div>
</div>

<form>
<input type="month" name="mes" value="{{mes_ref}}">
<button>OK</button>
</form>

<div class="dashboard">

<div class="card-stat">
Total<br>R$ {{total_geral}}
</div>

<div class="card-stat">
Recebido<br>R$ {{total_recebido}}
</div>

<div class="card-stat">
Gastos<br>R$ {{total_gastos}}
</div>

<div class="card-stat lucro {% if lucro >=0 %}positivo{% else %}negativo{% endif %}">
Lucro: R$ {{lucro}}
</div>

</div>

<hr>

{% for c in clientes %}
<div class="card">

<b>{{c[1]}}</b><br>
R$ {{c[3]}} - {{c[5]}}

<br><br>

<a href="/pago/{{c[0]}}?mes={{mes_ref}}">
<button class="btn info">Pago</button>
</a>

<a href="/delete/{{c[0]}}">
<button class="btn danger">Excluir</button>
</a>

</div>
{% endfor %}

</body>
</html>
