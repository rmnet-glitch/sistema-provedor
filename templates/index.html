<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema</title>

<style>
body{font-family:Arial;background:#f4f6f8;padding:10px;}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

input,button{
padding:6px;
font-size:13px;
}

.stats{
background:#fff;
padding:10px;
border-radius:8px;
margin-bottom:10px;
font-size:12px;
}

.card{
background:#fff;
padding:7px;
margin:5px 0;
border-radius:8px;
font-size:12px;
}

.atrasado{border-left:4px solid red;}
.em_dia{border-left:4px solid blue;}
.pago{border-left:4px solid green;}

.actions{display:flex;gap:5px;margin-top:5px;}

.btn{
flex:1;
padding:5px;
font-size:10px;
border:none;
border-radius:4px;
color:#fff;
}

.btn-info{background:#17a2b8}
.btn-danger{background:#dc3545}
.btn-dark{background:#343a40}
.btn-secondary{background:#6c757d}

.hidden{display:none;}
</style>
</head>

<body>

<div class="header">
<h3>👤 {{usuario}}</h3>

<div>
<a href="/backup">
<button style="background:#17a2b8;color:#fff">📦 Backup</button>
</a>

<a href="/config">
<button style="background:#6c757d;color:#fff">⚙️</button>
</a>

<a href="/logout">
<button style="background:#dc3545;color:#fff">🚪</button>
</a>
</div>
</div>

<form>
<input type="month" name="mes" value="{{mes_ref}}">
<input type="text" name="busca" placeholder="Buscar..." value="{{busca}}">
<button>OK</button>
</form>

<div class="stats">
💰 Total: {{total_geral}}<br>
💵 Recebido: {{total_recebido}}<br>
🔴 Atrasado: {{total_atrasado}}<br>
🔵 Em dia: {{total_em_dia}}
</div>

<hr>

{% for c in clientes %}

<div class="card {{c[5]}}">

<b>{{c[1]}}</b><br>
📞 {{c[2]}}<br>
💰 {{c[3]}} | 📅 {{c[4]}} | {{c[5]}}

<div class="actions">

<a href="/pago/{{c[0]}}?mes={{mes_ref}}">
<button class="btn btn-info">Pago</button>
</a>

<a href="/desfazer/{{c[0]}}?mes={{mes_ref}}">
<button class="btn btn-dark">Voltar</button>
</a>

</div>

</div>

{% endfor %}

</body>
</html>
