<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>
body {
    font-family: Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f2f2f2;
}

.box {
    background:white;
    padding:20px;
    border-radius:10px;
    width:90%;
    max-width:300px;
}

input {
    width:100%;
    padding:10px;
    margin:5px 0;
}

button {
    width:100%;
    padding:10px;
    background:green;
    color:white;
    border:none;
}

.error {
    color:red;
}
</style>

</head>

<body>

<div class="box">

<h3>Login Sistema</h3>

{% if erro %}
<p class="error">{{ erro }}</p>
{% endif %}

<form method="POST">

<input name="usuario" placeholder="Usuário">
<input name="senha" type="password" placeholder="Senha">

<button type="submit">Entrar</button>

</form>

</div>

</body>
</html>
