<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f4f6f8;padding:10px;}

input,textarea{
width:100%;
padding:8px;
margin:5px 0;
font-size:13px;
}

.btn{
padding:6px;
font-size:12px;
border:none;
border-radius:5px;
color:#fff;
margin-top:5px;
cursor:pointer;
}

.green{background:#28a745}
.gray{background:#6c757d}

.card{
background:#fff;
padding:10px;
border-radius:8px;
}
</style>
</head>

<body>

<h3>⚙️ Configurações</h3>

<a href="/">
<button class="btn gray">⬅ Voltar</button>
</a>

<hr>

<div class="card">

<p><b>Usuário:</b> {{usuario}}</p>

<form method="POST">

<label>🔑 Nova senha</label>
<input name="senha" type="password" placeholder="Digite nova senha">

<label>💬 Mensagem WhatsApp</label>
<textarea name="mensagem" rows="5">{{mensagem}}</textarea>

<button class="btn green">💾 Salvar alterações</button>

</form>

</div>

</body>
</html>
