<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#f4f6f8;
padding:10px;
}

input,textarea{
width:100%;
padding:8px;
margin:5px 0;
font-size:13px;
}

textarea{
white-space: pre-wrap;
font-family: inherit;
}

.btn{
padding:6px;
font-size:12px;
border:none;
border-radius:5px;
color:#fff;
margin-top:5px;
cursor:pointer;
}

.green{background:#28a745}
.gray{background:#6c757d}

.card{
background:#fff;
padding:10px;
border-radius:8px;
}
</style>
</head>

<body>

<h3>⚙️ Configurações</h3>

<a href="/">
<button class="btn gray">⬅ Voltar</button>
</a>

<hr>

<div class="card">

<p><b>Usuário:</b> {{usuario}}</p>

<form action="/config" method="post">

<label>🔑 Nova Senha</label>
<input name="senha" type="password" placeholder="Digite nova senha">

<button class="btn gray" name="senha_btn" value="1">🔐 Salvar Senha</button>

<hr>

<label>💬 Mensagem WhatsApp</label>

<!-- ✔ CORREÇÃO PRINCIPAL -->
<textarea name="mensagem" rows="8" style="white-space: pre-wrap;">{{mensagem}}</textarea>

<button class="btn green" name="msg_btn" value="1">💾 Salvar Mensagem</button>

</form>

</div>

</body>
</html>
