<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configurações</title>

<style>
body{font-family:Arial;background:#f4f6f8;padding:10px;}
.box{
background:#fff;padding:10px;border-radius:8px;
}
input,button{
padding:8px;margin:5px 0;width:100%;
}
</style>
</head>

<body>

<h3>⚙️ Configurações</h3>

<a href="{{ url_for('index') }}">
<button>⬅ Voltar</button>
</a>

<div class="box">

<form method="post">

<label>Nova senha:</label>
<input type="text" name="senha" placeholder="Digite nova senha">

<hr>

<label>Mensagem WhatsApp:</label>
<input type="text" name="mensagem" value="{{mensagem}}" placeholder="Mensagem padrão">

<hr>

<h4>📲 Integração WhatsApp</h4>

<label>
<input type="checkbox" name="usar_whatsapp" {% if usar_whatsapp %}checked{% endif %}>
Ativar envio automático
</label>

<input name="zapi_instance" value="{{zapi_instance}}" placeholder="Instance ID">
<input name="zapi_token" value="{{zapi_token}}" placeholder="Token API">

<button>Salvar</button>

</form>

</div>

</body>
</html>
