<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gastos</title>

<style>
body{
font-family:Arial;
background:#f4f6f8;
padding:10px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.topbar{
display:flex;
gap:5px;
flex-wrap:wrap;
margin-bottom:10px;
}

input,button{
padding:6px;
font-size:13px;
}

.card{
background:#fff;
padding:8px;
margin:5px 0;
border-radius:8px;
font-size:12px;
}

.total{
background:#fff;
padding:10px;
border-radius:8px;
margin-bottom:10px;
font-weight:bold;
}

.btn{
padding:5px;
font-size:11px;
border:none;
border-radius:4px;
color:#fff;
}

.btn-save{background:#28a745}
.btn-delete{background:#dc3545}
.btn-back{background:#343a40}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
<h3>💸 Gastos</h3>

<div>
<a href="/?mes={{mes_ref}}">
<button class="btn btn-back">⬅ Voltar</button>
</a>
</div>
</div>

<!-- FILTRO POR MÊS -->
<form class="topbar" method="get" action="/gastos">
<input type="month" name="mes" value="{{mes_ref}}">
<button>OK</button>
</form>

<!-- TOTAL -->
<div class="total">
💰 Total de Gastos: R$ {{total}}
</div>

<!-- FORM DE CADASTRO (CORRETO) -->
<div class="card">
<form action="/gastos" method="post">

<input type="hidden" name="mes" value="{{mes_ref}}">

<input name="descricao" placeholder="Descrição do serviço">
<input name="material" placeholder="Material utilizado">
<input name="valor" placeholder="Valor" required>

<button type="submit" class="btn btn-save">Salvar</button>

</form>
</div>

<hr>

<!-- LISTA -->
{% for g in gastos %}

<div class="card">

<b>📝 {{g[1] or '-'}}</b><br>

🧰 {{g[2] or '-'}}<br>

💰 R$ {{g[3]}}

<br><br>

<a href="/del_gasto/{{g[0]}}?mes={{mes_ref}}">
<button class="btn btn-delete">Excluir</button>
</a>

</div>

{% endfor %}

</body>
</html>
