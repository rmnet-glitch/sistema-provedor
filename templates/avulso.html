<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serviços Avulsos</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:Inter;
    background:#0f172a;
    color:#e2e8f0;
    padding:10px;
}

.header{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}

.card{
    background:#1e293b;
    padding:12px;
    border-radius:10px;
    margin:8px 0;
}

.grid{
    display:grid;
    gap:4px;
}

.tag{
    background:#f59e0b;
    color:#000;
    padding:2px 6px;
    font-size:10px;
    border-radius:6px;
}

.small{
    font-size:12px;
    opacity:0.8;
}

input,button{
    width:100%;
    padding:8px;
    margin-top:6px;
    border-radius:6px;
    border:none;
}

button{
    background:#22c55e;
    color:#fff;
}
</style>
</head>

<body>

<div class="header">
<h3>📦 Avulsos - {{usuario}}</h3>
<a href="/"><button>📅 Mensal</button></a>
</div>

<!-- FORM -->
<form action="/add_avulso" method="post">

<input name="nome" placeholder="Cliente" required>
<input name="telefone" placeholder="Telefone">

<input name="descricao_servico" placeholder="Serviço / Produto" required>
<input name="valor" placeholder="Valor" required>
<input name="data_venda" type="date">

<button>Salvar Avulso</button>

</form>

<hr>

<!-- LISTA -->
{% for a in avulsos %}

<div class="card">

<div class="grid">

<b>{{a[1]}} <span class="tag">AVULSO</span></b>

<div class="small">📞 {{a[2]}}</div>
<div>📦 {{a[3]}}</div>
<div>💰 R$ {{a[4]}}</div>
<div class="small">📅 {{a[5]}}</div>

</div>

</div>

{% endfor %}

</body>
</html>
