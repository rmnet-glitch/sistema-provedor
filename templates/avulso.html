<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avulsos</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
    font-family: Inter;
    background:#0f172a;
    color:#e2e8f0;
    padding:10px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.card{
    background:#1e293b;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.form{
    background:#111827;
    padding:10px;
    border-radius:10px;
    margin-bottom:15px;
}

input, button{
    width:100%;
    padding:8px;
    margin-top:6px;
    border-radius:6px;
    border:none;
}

button{
    background:#22c55e;
    color:#fff;
    font-weight:bold;
}

.btn-danger{
    background:#ef4444;
    color:#fff;
    padding:6px;
    border-radius:6px;
    text-decoration:none;
    display:inline-block;
    margin-top:6px;
}

.tag{
    display:inline-block;
    background:#f59e0b;
    color:#000;
    padding:2px 6px;
    font-size:10px;
    border-radius:6px;
}

.small{
    font-size:12px;
    opacity:0.8;
}

.grid{
    display:grid;
    gap:4px;
}

</style>
</head>

<body>

<div class="header">
<h3>📦 Avulsos</h3>
<a href="/"><button>📅 Mensal</button></a>
</div>

<!-- FORM -->
<div class="form">

<form action="/add_cliente" method="post">

<input name="nome" placeholder="Cliente" required>
<input name="telefone" placeholder="Telefone" required>
<input name="valor" placeholder="Valor" required>

<input name="descricao_servico" placeholder="Serviço / Produto">
<input name="data_venda" type="date">

<input type="hidden" name="tipo_cobranca" value="avulso">

<button>Salvar Avulso</button>

</form>

</div>

<hr>

<!-- LISTA -->
{% for c in clientes %}

{% if c[5] == 'avulso' %}

<div class="card">

<div class="grid">

<b>{{c[1]}} <span class="tag">AVULSO</span></b>

<div class="small">📞 {{c[2]}}</div>
<div>💰 R$ {{c[3]}}</div>


📦 Serviço: {{c[5] or 'Não informado'}}<br>
📅 Venda: {{c[6] or 'Sem data'}}<br>

</div>

<a class="btn-danger" href="/delete/{{c[0]}}">🗑 Excluir</a>

</div>

{% endif %}

{% endfor %}

</body>
</html>
