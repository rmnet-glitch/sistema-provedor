<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serviços Avulsos</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:Inter;
    background:#0f172a;
    color:#e2e8f0;
    padding:10px;
}

.header{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}

.card{
    background:#1e293b;
    padding:12px;
    border-radius:10px;
    margin:8px 0;
}

.grid{
    display:grid;
    gap:4px;
}

.tag{
    background:#f59e0b;
    color:#000;
    padding:2px 6px;
    font-size:10px;
    border-radius:6px;
}

.small{
    font-size:12px;
    opacity:0.8;
}

input,button{
    width:100%;
    padding:8px;
    margin-top:6px;
    border-radius:6px;
    border:none;
}

button{
    background:#22c55e;
    color:#fff;
}
</style>
</head>

<body>

<div class="header">
<h3>📦 Avulsos - {{usuario}} ({{mes_ref}})</h3>
<a href="/"><button>📅 Mensal</button></a>
</div>

<!-- FORM -->

<form action="/add_avulso" method="post">

<input name="cliente_id" placeholder="ID do cliente (opcional)">
<input name="descricao" placeholder="Serviço / Produto" required>
<input name="valor" placeholder="Valor" required>
<input name="data_venda" type="date">

<button>Salvar Avulso</button>

</form>

<form method="get" action="/avulso">

<input type="month" name="mes" value="{{ mes_ref }}">

<button>Filtrar</button>

</form>

<hr>

<!-- LISTA -->
<!-- LISTA DE AVULSOS -->
{% for a in avulsos %}

<div class="card">

<b>📦 Avulso #{{ a[0] }}</b> <span class="tag">AVULSO</span><br>

🆔 Cliente ID: {{ a[1] }}<br>
📦 Descrição: {{ a[2] or 'Não informado' }}<br>
💰 R$ {{ a[3] }}<br>
📅 Data: {{ a[4] or 'Sem data' }}<br>

<a class="btn btn-danger" href="/delete_avulso/{{ a[0] }}">
🗑 Excluir
</a>

</div>

{% endfor %}

</body>
</html>
