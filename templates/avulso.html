<!-- ================= AVULSO ================= -->
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clientes Avulsos</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
    font-family: Inter;
    background:#0f172a;
    color:#e2e8f0;
    padding:10px;
}

.header{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}

.card{
    background:#1e293b;
    padding:10px;
    margin:6px 0;
    border-radius:10px;
}

.actions{
    display:flex;
    gap:5px;
    margin-top:6px;
}

.btn{
    flex:1;
    padding:6px;
    font-size:11px;
    border-radius:6px;
    color:#fff;
    border:none;
}

.btn-success{background:#22c55e}
.btn-info{background:#3b82f6}
.btn-danger{background:#ef4444}

.avulso-tag{
    display:inline-block;
    padding:2px 6px;
    font-size:10px;
    background:#f59e0b;
    color:#000;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="header">
<h3>📦 Avulsos - {{usuario}}</h3>
<a href="/"><button>📅 Mensal</button></a>
</div>

<!-- FORM CADASTRO AVULSO -->

<form action="/add_cliente" method="post">

<input name="nome" placeholder="Cliente" required>
<input name="telefone" placeholder="Telefone" required>
<input name="valor" placeholder="Valor" required>

<input name="descricao_servico" placeholder="Serviço / Produto">
<input name="data_venda" type="date">

<input type="hidden" name="tipo_cobranca" value="avulso">

<button>Salvar Avulso</button>

</form>

<hr>

{% for c in clientes %}

{% if c[5] == 'avulso' %}

<div class="card">

<b>{{c[1]}} <span class="avulso-tag">AVULSO</span></b><br>

📞 {{c[2]}}<br>
💰 {{c[3]}}<br>

<!-- NOVOS CAMPOS FUTUROS -->
📦 Serviço: {{c[6] if c|length > 6 else 'N/A'}}<br>
📅 Venda: {{c[7] if c|length > 7 else 'N/A'}}

<div class="actions">

<a href="/delete/{{c[0]}}">
<button class="btn btn-danger">🗑 Excluir</button>
</a>

</div>

</div>

{% endif %}

{% endfor %}

</body>
</html>
