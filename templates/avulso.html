<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serviços Avulsos</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
    font-family:Inter;
    background: linear-gradient(135deg, #0f172a, #111827);
    color:#e2e8f0;
    padding:10px;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

/* BOTÕES */
button{
    width:100%;
    padding:8px;
    margin-top:6px;
    border-radius:8px;
    border:none;
    background:#22c55e;
    color:#fff;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.02);
    opacity:0.9;
}

/* CARD */
.card{
    background:#1e293b;
    padding:12px;
    border-radius:12px;
    margin:8px 0;
    box-shadow:0 0 12px rgba(0,0,0,0.4);
}

/* TAG */
.tag{
    background:#f59e0b;
    color:#000;
    padding:2px 6px;
    font-size:10px;
    border-radius:6px;
}

/* INPUTS */
input{
    width:100%;
    padding:8px;
    margin-top:6px;
    border-radius:8px;
    border:none;
    outline:none;
}

/* BOTÃO DANGER */
.btn-danger{
    background:#ef4444;
    padding:6px;
    border-radius:8px;
    display:inline-block;
    text-decoration:none;
    color:#fff;
    margin-top:6px;
}

/* FORM OCULTO */
.hidden{
    display:none;
}

/* FILTRO */
.filter-box{
    margin:10px 0;
    background:#1e293b;
    padding:10px;
    border-radius:10px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<h3>📦 Avulsos - {{usuario}} ({{mes_ref}})</h3>
<a href="/"><button>📅 Mensal</button></a>
</div>

<!-- BOTÃO CADASTRAR -->
<button onclick="toggleForm()">➕ Cadastrar Serviço Avulso</button>

<!-- FORM CADASTRO (HIDDEN) -->
<div id="formAvulso" class="hidden">

<form action="/add_avulso" method="post">

<input name="cliente_id" placeholder="ID do cliente (opcional)">
<input name="descricao" placeholder="Serviço / Produto" required>
<input name="valor" placeholder="Valor" required>
<input name="data_venda" type="date">

<button type="submit">Cadastrar serviço avulso</button>

</form>

</div>

<!-- FILTRO -->
<div class="filter-box">

<form method="get" action="/avulso">

<input type="month" name="mes" value="{{ mes_ref }}">

<button>Filtrar</button>

</form>

</div>

<hr>

<!-- LISTA -->
{% for a in avulsos %}

<div class="card">

<b>📦 Avulso #{{ a[0] }}</b> <span class="tag">AVULSO</span><br>

🆔 Cliente ID: {{ a[1] }}<br>
📦 Descrição: {{ a[2] or 'Não informado' }}<br>
💰 R$ {{ a[3] }}<br>
📅 Data: {{ a[4] or 'Sem data' }}<br>

<a class="btn-danger" href="/delete_avulso/{{ a[0] }}">
🗑 Excluir
</a>

</div>

{% endfor %}

<script>
function toggleForm(){
    let f = document.getElementById("formAvulso");

    if(f.classList.contains("hidden")){
        f.classList.remove("hidden");
    } else {
        f.classList.add("hidden");
    }
}
</script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js');
}
</script>

</body>
</html>
